# TinyWinNFS Server configuration for Windows Client for NFS integration tests.
#
# This profile is intentionally different from the normal QNX-oriented default.
# Windows Client for NFS anonymous mounts commonly use UID=-2 and GID=-2, so the
# returned NFS attributes must grant write access to that identity.

portmap.port=111
nfs.port=2049
mount.port=20048

export.name=/export
export.path=work/tmp/windows-client-export
export.writable=true
export.allowed.clients=127.0.0.1

exports.count=1
exports.1.name=/export
exports.1.path=work/tmp/windows-client-export
exports.1.writable=true
exports.1.allowed.clients=127.0.0.1

uid=-2
gid=-2
permission.identity=auto
file.mode=0666
directory.mode=0777
block.size=4096
read.size=8192
filename.charset=Shift_JIS
