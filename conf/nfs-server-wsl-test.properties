# WSL mount test configuration.
# This file uses high UDP/TCP ports to avoid administrator-only low ports.

portmap.port=11111
nfs.port=12049
mount.port=12048

export.name=/export
export.path=export
export.writable=true
export.allowed.clients=

exports.count=1
exports.1.name=/export
exports.1.path=export
exports.1.writable=true
exports.1.allowed.clients=

client.server.host=windows-host
client.mount.point=/mnt/qnx-nfs-test
ui.language=auto

uid=0
gid=0
permission.identity=auto
file.mode=0444
directory.mode=0555
block.size=4096
read.size=8192
filename.charset=UTF-8
